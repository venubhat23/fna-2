default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    host: <%= ENV['DB_HOST'] || 'dpg-d8c5ce6q1p3s73fvu23g-a.oregon-postgres.render.com' %>
    database: <%= ENV['DB_NAME'] || 'atmanorbahe' %>
    username: <%= ENV['DB_USERNAME'] || 'atmanorbahe_user' %>
    password: <%= ENV['DB_PASSWORD'] || 'vPlHyWMRbfdw0eP1mVyHycpCkWP9wdMZ' %>
    port: <%= ENV['DB_PORT'] || 5432 %>
  cable:
    <<: *primary_development
  queue:
    <<: *primary_development
  cache:
    <<: *primary_development

test:
  primary: &primary_test
    <<: *default
    database: atmanirbhar_farm_test
  cable:
    <<: *primary_test
  queue:
    <<: *primary_test
  cache:
    <<: *primary_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV['DATABASE_URL'] || 'postgresql://atmanorbahe_user:vPlHyWMRbfdw0eP1mVyHycpCkWP9wdMZ@dpg-d8c5ce6q1p3s73fvu23g-a/atmanorbahe' %>
    host: <%= ENV['DB_HOST'] || 'dpg-d8c5ce6q1p3s73fvu23g-a.oregon-postgres.render.com' %>
    database: <%= ENV['DB_NAME'] || 'atmanorbahe' %>
    username: <%= ENV['DB_USERNAME'] || 'atmanorbahe_user' %>
    password: <%= ENV['DB_PASSWORD'] || 'vPlHyWMRbfdw0eP1mVyHycpCkWP9wdMZ' %>
    port: <%= ENV['DB_PORT'] || 5432 %>
  cable:
    <<: *primary_production
  queue:
    <<: *primary_production
  cache:
    <<: *primary_production