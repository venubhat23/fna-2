default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    host: <%= ENV['DB_HOST'] || 'dpg-d76s69ea2pns73ebufk0-a.ohio-postgres.render.com' %>
    database: <%= ENV['DB_NAME'] || 'atmanirbhar_farm_o0op' %>
    username: <%= ENV['DB_USERNAME'] || 'atmanirbhar_farm_o0op_user' %>
    password: <%= ENV['DB_PASSWORD'] || 'ACIofo3jZRPAzG3kkpbEWmz9ANmf5Zz4' %>
    port: <%= ENV['DB_PORT'] || 5432 %>
  cable:
    <<: *primary_development
  queue:
    <<: *primary_development
  cache:
    <<: *primary_development

test:
  primary: &primary_test
    <<: *default
    database: atmanirbhar_farm_test
  cable:
    <<: *primary_test
  queue:
    <<: *primary_test
  cache:
    <<: *primary_test

production:
